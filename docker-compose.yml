services:
  config-server:
    build:
      context: ./infra/config-server
      dockerfile: Dockerfile
    container_name: config-server
    restart: unless-stopped
    ports:
      - "7072:7071"
    volumes:
      - ./infra/config-repo:/config-repo
    environment:
      SPRING_PROFILES_ACTIVE: native
      CONFIG_REPO_LOCATION: file:/config-repo
    networks:
      - ms-net

  registry-server:
    build:
      context: ./infra/registry-server
      dockerfile: Dockerfile
    container_name: registry-server
    restart: unless-stopped
    depends_on:
      - config-server
    ports:
      - "7082:7081"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      CONFIG_SERVER_URL: http://config-server:7071
    networks:
      - ms-net

  gateway:
    build:
      context: ./infra/gateway
      dockerfile: Dockerfile
    container_name: gateway
    restart: unless-stopped
    depends_on:
      - config-server
      - registry-server
    ports:
      - "7092:7091"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      CONFIG_SERVER_URL: http://config-server:7071
    networks:
      - ms-net

  mysql-service-request:
    image: mysql:8.0
    container_name: mysql-service-request
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: db_ms_service_request
    ports:
      - "3313:3306"
    volumes:
      - mysql-service-request-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 25s
    networks:
      - request-net

  service-request-1:
    build:
      context: ./services/service-request
      dockerfile: Dockerfile
    container_name: service-request-1
    depends_on:
      mysql-service-request:
        condition: service_healthy
    restart: unless-stopped
    environment:
      SERVER_PORT: 8003
      SPRING_PROFILES_ACTIVE: prod
      DB_HOST: mysql-service-request
      DB_PORT: 3306
      DB_NAME: db_ms_service_request
      DB_USERNAME: root
      DB_PASSWORD: root
      CONFIG_SERVER_URL: http://config-server:7071
      EUREKA_DEFAULT_ZONE: http://registry-server:7081/eureka
      EUREKA_INSTANCE_HOSTNAME: service-request-1
      EUREKA_INSTANCE_PREFER_IP_ADDRESS: "false"
      EUREKA_INSTANCE_INSTANCE_ID: ms-service-request:service-request-1:8003
    ports:
      - "8003:8003"
    networks:
      - request-net
      - ms-net

  service-request-2:
    build:
      context: ./services/service-request
      dockerfile: Dockerfile
    container_name: service-request-2
    depends_on:
      mysql-service-request:
        condition: service_healthy
    restart: unless-stopped
    environment:
      SERVER_PORT: 8003
      SPRING_PROFILES_ACTIVE: prod
      DB_HOST: mysql-service-request
      DB_PORT: 3306
      DB_NAME: db_ms_service_request
      DB_USERNAME: root
      DB_PASSWORD: root
      CONFIG_SERVER_URL: http://config-server:7071
      EUREKA_DEFAULT_ZONE: http://registry-server:7081/eureka
      EUREKA_INSTANCE_HOSTNAME: service-request-2
      EUREKA_INSTANCE_PREFER_IP_ADDRESS: "false"
      EUREKA_INSTANCE_INSTANCE_ID: ms-service-request:service-request-2:8003
    ports:
      - "8004:8003"
    networks:
      - request-net
      - ms-net

volumes:
  mysql-service-request-data:

networks:
  ms-net:
  request-net:
