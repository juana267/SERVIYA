name: catalogo-prod

version: "3.9"

services:
  mysql-catalogo:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${CATALOGO_MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${CATALOGO_MYSQL_DATABASE}
    ports:
      - "3308:3306" # Tu máquina (cliente externo) → MySQL prod
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -p${CATALOGO_MYSQL_ROOT_PASSWORD} || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    volumes:
      - mysql_catalogo_data:/var/lib/mysql
    networks:
      - catalogo-int

  catalogo:
    build: .
    restart: unless-stopped
    depends_on:
      mysql-catalogo:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE}
      CONFIG_SERVER_URL: ${CONFIG_SERVER_URL}
      CATALOGO_DB_HOST: ${CATALOGO_DB_HOST}
      CATALOGO_DB_PORT: ${CATALOGO_DB_PORT}
      CATALOGO_DB_NAME: ${CATALOGO_DB_NAME}
      CATALOGO_DB_USERNAME: ${CATALOGO_DB_USERNAME}
      CATALOGO_DB_PASSWORD: ${CATALOGO_DB_PASSWORD}
    ports:
      - "8082:8082"
    networks:
      - catalogo-int
      - ms-net

volumes:
  mysql_catalogo_data:

#networks:
#  catalogo-net:
#    name: catalogo-net
networks:
  ms-net:
    external: true
    name: ms-net
  catalogo-int:
    name: catalogo-int