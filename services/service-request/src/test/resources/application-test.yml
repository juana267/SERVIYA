server:
  port: 0

spring:
  autoconfigure:
    exclude: org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration
  config:
    import: ""
  datasource:
    url: jdbc:h2:mem:msservicerequest;MODE=MYSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
  cloud:
    config:
      enabled: false
    discovery:
      enabled: false
    openfeign:
      circuitbreaker:
        enabled: false

eureka:
  client:
    enabled: false

security:
  jwt:
    secret: VGhpc0lzQVN1cGVyU2VjdXJlSldUU2VjcmV0S2V5Rm9yTXNVc2VyczIwMjY=
